[project]
name = "aios"
version = "0.1.0"
description = "Monorepo root for Personal AI OS"
requires-python = ">=3.12"
dependencies = []

[tool.pytest.ini_options]
testpaths = ["core/tests"]
pythonpath = ["core/src"]

