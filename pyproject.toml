[project]
name = "aios"
version = "0.1.0"
description = "Monorepo root for Personal AI OS"
requires-python = ">=3.12"
dependencies = []

[tool.pytest.ini_options]
testpaths = ["core/tests"]
pythonpath = ["core/src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "B", "I", "N"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
